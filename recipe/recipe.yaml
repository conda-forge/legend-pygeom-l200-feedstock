schema_version: 1

context:
  name: legend-pygeom-l200
  version: 0.9.0
  python_min: '3.10'

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/legend_pygeom_l200-${{ version }}.tar.gz
  sha256: c63bd020422d2efe7fdd9d5b96f8f25547285eb23da947e3a8bd650634e67063

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation --disable-pip-version-check
  python:
    entry_points:
      - legend-pygeom-l200 = pygeoml200.cli:dump_gdml_cli

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=77
    - setuptools-scm >=7
    - pip
  run:
    - jsonschema
    - python >=${{ python_min }}
    - dbetto
    - legend-pygeom-hpges >=0.9.0
    - legend-pygeom-optics >=0.17.1
    - legend-pygeom-tools >=0.5.0
    - numpy
    - pint
    - pyg4ometry >=1.3.4
    - pylegendmeta >=v1.3.1
    - pyyaml
    - scipy
tests:
  - python:
      imports:
        - l200geom
        - pygeoml200
      pip_check: true
      python_version: ${{ python_min }}
  - requirements:
      run:
        - git
    script:
      - legend-pygeom-l200 --public-geom test.gdml

about:
  summary: Geometry model of the LEGEND-200 experimental setup
  license: GPL-3.0-only
  license_file: LICENSE
  homepage: https://github.com/legend-exp/legend-pygeom-l200
  repository: https://github.com/legend-exp/legend-pygeom-l200
  documentation: https://legend-pygeom-l200.readthedocs.io

extra:
  recipe-maintainers:
    - gipert
    - ManuelHu
